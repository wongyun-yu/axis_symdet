<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Symmetry-themed favicon: a bilaterally symmetric butterfly about a central reflection axis -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="#4F46E5"/>

  <!-- central reflection axis (dashed) -->
  <line x1="256" y1="72" x2="256" y2="440" stroke="#C7D2FE" stroke-width="8"
        stroke-linecap="round" stroke-dasharray="2 26" opacity="0.9"/>

  <!-- wings (mirrored about x = 256) -->
  <g fill="#FFFFFF">
    <ellipse cx="178" cy="196" rx="84" ry="104"/>
    <ellipse cx="334" cy="196" rx="84" ry="104"/>
    <ellipse cx="198" cy="336" rx="66" ry="80"/>
    <ellipse cx="314" cy="336" rx="66" ry="80"/>
  </g>

  <!-- body sitting on the axis -->
  <rect x="247" y="120" width="18" height="296" rx="9" fill="#312E81"/>

  <!-- antennae -->
  <g fill="none" stroke="#312E81" stroke-width="9" stroke-linecap="round">
    <path d="M256 124 C 240 96, 224 88, 206 92"/>
    <path d="M256 124 C 272 96, 288 88, 306 92"/>
  </g>
</svg>
